<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.clarity.ms; connect-src 'self' https://clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wvm11ohnho");
    </script>

    <title>Golf Now</title>
    <style>
        body { margin: 0; background: #05080c; color: white; font-family: monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { margin: 10px; padding: 15px 30px; background: #1a2a3a; border: 1px solid #00ffcc; color: white; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .stats { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 20px; pointer-events: none; }
    </style>
</head>
<body>

<div class="stats" id="stats">PLN: 0</div>

<div id="menu">
    <h1>GOLF NOW</h1>
    <div id="shop" style="margin-bottom: 20px;">
        <button class="btn" onclick="buyPowerup()">Kup "Magnes" (500 PLN)</button>
    </div>
    <div id="sectors"></div>
</div>

<canvas id="game"></canvas>

<script>
    let money = parseInt(localStorage.getItem('money')) || 0;
    let sector = parseInt(localStorage.getItem('sector')) || 1;
    let isPlaying = false;
    
    function updateUI() {
        document.getElementById('stats').innerText = "PLN: " + money;
        const container = document.getElementById('sectors');
        container.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button');
            b.className = 'btn';
            b.innerText = "Sektor " + i;
            b.disabled = i > sector;
            b.style.opacity = i <= sector ? 1 : 0.3;
            b.onclick = () => startGame(i);
            container.appendChild(b);
        }
    }

    function buyPowerup() {
        if(money >= 500) { money -= 500; alert("Magnes aktywny!"); save(); updateUI(); }
        else alert("Za mało kasy!");
    }

    function save() {
        localStorage.setItem('money', money);
        localStorage.setItem('sector', sector);
    }

    function startGame(s) {
        document.getElementById('menu').style.display = 'none';
        isPlaying = true;
        // Inicjalizacja gry...
    }

    updateUI();
</script>
</body>
</html>
